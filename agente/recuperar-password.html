<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Password Agente — AcheiDoc</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#12305f">
  <meta name="description" content="AcheiDoc — Plataforma angolana para recuperação de documentos perdidos. Publica achados e resgata o teu documento.">
  <meta property="og:title" content="AcheiDoc — Recupere os seus documentos perdidos">
  <meta property="og:description" content="Plataforma angolana para recuperação de documentos perdidos. Publica achados e resgata o teu documento.">
  <meta property="og:image" content="https://acheidoc.ao/favicon.svg">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_AO">
</head>
<body style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg-light);">

  <div style="width:100%; max-width:420px; padding:1rem;">
    <div class="card card-lg">
      <h2 style="font-size:1.3rem; font-weight:700; margin-bottom:1.25rem;">Recuperar password do agente</h2>
      <p style="color:var(--text-gray); margin-bottom:1rem;">Defina uma nova password para acesso ao portal de agente.</p>

      <div id="errorMsg" class="alert alert-danger hidden"></div>
      <div id="okMsg" class="alert alert-success hidden"></div>

      <form id="formRecuperar">
        <div class="form-group">
          <label class="form-label">Email do agente</label>
          <input type="email" id="emailInput" class="form-input" placeholder="agente@acheidoc.ao" required>
        </div>
        <div class="form-group">
          <label class="form-label">Nova password</label>
          <input type="password" id="novaSenhaInput" class="form-input" placeholder="Mínimo 4 caracteres" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar password</label>
          <input type="password" id="confirmarSenhaInput" class="form-input" placeholder="Repita a password" required>
        </div>

        <button type="submit" id="btnGuardarSenha" class="btn btn-primary btn-full btn-lg">Enviar email com nova password</button>
      </form>

      <div style="margin-top:1rem; text-align:center;">
        <a href="login.html" class="link-primary">← Voltar ao login de agente</a>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/agente-recuperar-password.js"></script>
</body>
</html>
