<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — AcheiDoc</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="auth-body auth-login-split">

  <div class="auth-container">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <span class="auth-logo-icon">AD</span>
        <span class="auth-logo-text">AcheiDoc</span>
      </div>

      <!-- Título -->
      <h1 class="auth-title">Criar Conta</h1>
      <p class="auth-subtitle">Registe-se gratuitamente e comece a usar</p>

      <!-- Alerta de erro -->
      <div id="alertaErro" class="alert alert-danger" style="display:none"></div>

      <!-- Formulário -->
      <form id="formCadastro">
        <div class="form-group">
          <label class="form-label">Nome Completo</label>
          <input type="text" id="inputNome" class="form-input" placeholder="O seu nome completo" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="inputEmail" class="form-input" placeholder="o-seu-email@gmail.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input type="tel" id="inputTelefone" class="form-input" placeholder="+244 9XX XXX XXX" required>
        </div>
        <div class="form-group">
          <label class="form-label">Município</label>
          <select id="inputMunicipio" class="form-input" required>
            <option value="">Seleccione o município</option>
            <option value="Luanda">Luanda</option>
            <option value="Viana">Viana</option>
            <option value="Cacuaco">Cacuaco</option>
            <option value="Belas">Belas</option>
            <option value="Cazenga">Cazenga</option>
            <option value="Kilamba">Kilamba</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <div class="input-password-wrap">
            <input type="password" id="inputSenha" class="form-input" placeholder="Mínimo 4 caracteres" minlength="4" required>
            <button type="button" class="btn-toggle-password" id="btnTogglePasswordCadastro">Ver</button>
          </div>
          <div id="forcaSenha" class="forca-senha"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar Senha</label>
          <div class="input-password-wrap">
            <input type="password" id="inputConfirmarSenha" class="form-input" placeholder="Repita a senha" required>
            <span id="iconConfirmar" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:1rem;"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="checkTermos" required>
            Aceito os <a href="#" class="link-primary">Termos e Condições</a>
          </label>
        </div>
        <button type="submit" class="btn btn-success btn-full btn-lg">
          Criar Conta Gratuitamente
        </button>
      </form>

      <!-- Card de sucesso (oculto inicialmente) -->
      <div id="sucessoCadastro" style="display:none" class="auth-sucesso">
        <h2>Conta criada com sucesso!</h2>
        <p>Bem-vindo(a), <strong id="nomeBoasVindas"></strong>!</p>
        <p class="auth-subtitle">A sua conta foi criada. Pode agora publicar achados e buscar documentos.</p>
        <a href="index.html" class="btn btn-primary btn-full btn-lg">Ir para o início</a>
      </div>

      <!-- Divisor -->
      <div class="auth-divider"><span>ou</span></div>

      <!-- Link login -->
      <p class="auth-switch">
        Já tem conta? <a href="login.html" class="link-primary">Entrar</a>
      </p>

      <!-- Voltar -->
      <div class="auth-back">
        <a href="index.html">← Voltar ao início</a>
      </div>

    </div>
  </div>

  <script src="js/mockData.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cadastro.js"></script>
</body>
</html>
