<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta — AcheiDoc</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-light);
      padding: 1.5rem 1rem;
    }

    .cadastro-box {
      width: 100%;
      max-width: 460px;
    }

    .cadastro-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .cadastro-logo a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
    }

    .cadastro-logo p {
      color: var(--text-gray);
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }

    .forca-senha-wrapper {
      margin-top: 0.4rem;
    }

    .forca-senha-bar-bg {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    #forcaSenhaBar {
      height: 100%;
      width: 0;
      border-radius: 3px;
      transition: width 0.3s, background 0.3s;
    }

    #forcaSenhaText {
      font-size: 0.8rem;
      margin-top: 0.2rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="cadastro-box">

    <div class="cadastro-logo">
      <a href="index.html">📄 AcheiDoc</a>
      <p>Crie a sua conta gratuitamente</p>
    </div>

    <div class="card card-lg">
      <h2 style="font-size:1.3rem; font-weight:700; margin-bottom:1.5rem;">👤 Nova Conta</h2>

      <div id="errorCadastro" class="alert alert-danger hidden"></div>
      <div id="successCadastro" class="alert alert-success hidden"></div>

      <form id="formCadastro" novalidate>
        <div class="form-group">
          <label class="form-label">Nome completo</label>
          <input type="text" id="nomeCadastro" class="form-input" placeholder="Ex: Carlos Alberto Mendes" autocomplete="name" required minlength="3">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="emailCadastro" class="form-input" placeholder="o-seu-email@exemplo.ao" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <div style="position:relative;">
            <input type="password" id="senhaCadastro" class="form-input" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6" style="padding-right:3rem;">
            <button type="button" id="toggleSenhaCadastro" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;" title="Mostrar/ocultar senha">👁️</button>
          </div>
          <div class="forca-senha-wrapper">
            <div class="forca-senha-bar-bg"><div id="forcaSenhaBar"></div></div>
            <span id="forcaSenhaText"></span>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar senha</label>
          <input type="password" id="confirmarSenha" class="form-input" placeholder="Repita a senha" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">Criar Conta Grátis →</button>
      </form>

      <div style="text-align:center; margin-top:1.25rem; color:var(--text-gray); font-size:0.9rem;">
        Já tem conta? <a href="login.html" style="color:var(--primary); font-weight:600;">Entrar →</a>
      </div>
    </div>

    <div style="text-align:center; margin-top:1.5rem;">
      <a href="index.html" style="color:var(--primary); font-weight:600;">← Voltar ao início</a>
    </div>

  </div>

  <script src="js/mockData.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cadastro.js"></script>
  <script>
    // Toggle mostrar/ocultar senha
    var toggleBtn = document.getElementById('toggleSenhaCadastro');
    var senhaField = document.getElementById('senhaCadastro');
    if (toggleBtn && senhaField) {
      toggleBtn.addEventListener('click', function () {
        senhaField.type = senhaField.type === 'password' ? 'text' : 'password';
        toggleBtn.textContent = senhaField.type === 'password' ? '👁️' : '🙈';
      });
    }
  </script>
</body>
</html>
