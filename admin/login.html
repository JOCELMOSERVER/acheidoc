<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — AcheiDoc</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background: linear-gradient(135deg, #1E1B4B, #312E81);">

  <div style="width:100%; max-width:420px; padding:1rem;">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:2rem;">
      <a href="../index.html" style="display:inline-flex; align-items:center; gap:0.5rem; font-size:1.8rem; font-weight:800; color:white; text-decoration:none;">
        <span style="width:40px;height:40px;display:inline-flex;align-items:center;justify-content:center;border-radius:12px;background:rgba(255,255,255,0.14);font-size:0.9rem;font-weight:700;letter-spacing:0.08em;">AD</span>
        AcheiDoc
      </a>
      <p style="color:rgba(255,255,255,0.7); margin-top:0.5rem;">Painel Administrativo</p>
    </div>

    <div class="card card-lg">
      <h2 style="font-size:1.3rem; font-weight:700; margin-bottom:1.5rem;">Acesso administrativo</h2>

      <div id="errorMsg" class="alert alert-danger hidden"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="emailInput" class="form-input" placeholder="admin@acheidoc.ao" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" id="senhaInput" class="form-input" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" id="btnEntrar" class="btn btn-full btn-lg" style="background: #312E81; color:white;">
          Entrar no Painel
        </button>
      </form>

   

    <div style="text-align:center; margin-top:1.5rem;">
      <a href="../index.html" style="color:rgba(255,255,255,0.8); font-weight:600;">← Voltar ao início</a>
    </div>

  </div>
  <script src="../js/api.js"></script>
  <script src="../js/admin-login.js"></script>
</body>
</html>
