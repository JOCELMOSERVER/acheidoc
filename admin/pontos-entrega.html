<div class="page-header">
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h1>Pontos de Entrega</h1>
      <button id="btnCriarPonto" class="btn btn-primary">+ Novo Ponto</button>
    </div>
  </div>
</div>

<main class="page-content">
  <div class="container">
    <!-- Formulário Criar/Editar (oculto por padrão) -->
    <div id="formContainer" class="card hidden" style="margin-bottom:2rem; border-left:4px solid var(--primary);">
      <h3 style="margin-bottom:1.5rem;">Registar novo ponto de entrega</h3>
      <form id="formNovoPonto">
        <div class="grid-2" style="gap:1rem;">
          <div class="form-group">
            <label class="form-label">Nome do Ponto *</label>
            <input type="text" id="inputNome" class="form-input" placeholder="Ex: Ponto Viana Centro" required>
          </div>
          <div class="form-group">
            <label class="form-label">Município *</label>
            <input type="text" id="inputMunicipio" class="form-input" placeholder="Ex: Viana" required>
          </div>
          <div class="form-group">
            <label class="form-label">Provínc ia *</label>
            <input type="text" id="inputProvincia" class="form-input" placeholder="Ex: Luanda" required>
          </div>
          <div class="form-group">
            <label class="form-label">Horário *</label>
            <input type="text" id="inputHorario" class="form-input" placeholder="Ex: Seg-Sex: 08h-17h" required>
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label class="form-label">Endereço *</label>
            <input type="text" id="inputEndereco" class="form-input" placeholder="Ex: Rua Principal, Bairro X" required>
          </div>
          <div class="form-group">
            <label class="form-label">Telefone *</label>
            <input type="tel" id="inputTelefone" class="form-input" placeholder="Ex: +244 923 000 000" required>
          </div>
        </div>
        <div style="display:flex; gap:0.75rem; margin-top:1.5rem;">
          <button type="submit" class="btn btn-primary btn-full">Guardar Ponto</button>
          <button type="button" id="btnCancelar" class="btn btn-outline btn-full">Cancelar</button>
        </div>
      </form>
    </div>

    <!-- Lista de Pontos -->
    <div class="card">
      <table class="table" style="width:100%; border-collapse:collapse;">
        <thead>
          <tr style="border-bottom:2px solid var(--border);">
            <th style="text-align:left; padding:0.75rem; font-weight:700;">Nome</th>
            <th style="text-align:left; padding:0.75rem; font-weight:700;">Local</th>
            <th style="text-align:left; padding:0.75rem; font-weight:700;">Telefone</th>
            <th style="text-align:left; padding:0.75rem; font-weight:700;">Horário</th>
            <th style="text-align:left; padding:0.75rem; font-weight:700;">Ação</th>
          </tr>
        </thead>
        <tbody id="tabelaBody">
          <tr><td colspan="5" style="text-align:center; padding:2rem; color:var(--text-gray);">A carregar...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>
