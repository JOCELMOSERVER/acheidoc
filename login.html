<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — AcheiDoc</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#12305f">
  <meta name="description" content="AcheiDoc — Plataforma angolana para recuperação de documentos perdidos. Publica achados e resgata o teu documento.">
  <meta property="og:title" content="AcheiDoc — Recupere os seus documentos perdidos">
  <meta property="og:description" content="Plataforma angolana para recuperação de documentos perdidos. Publica achados e resgata o teu documento.">
  <meta property="og:image" content="https://acheidoc.ao/favicon.svg">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_AO">
</head>
<body class="auth-body auth-login-split">

  <div class="auth-container">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <span class="auth-logo-icon">AD</span>
        <span class="auth-logo-text">AcheiDoc</span>
      </div>

      <!-- Título -->
      <h1 class="auth-title">Bem-vindo de volta!</h1>
      <p class="auth-subtitle">Entre na sua conta para continuar</p>

     

      <!-- Alerta de erro -->
      <div id="alertaErro" class="alert alert-danger" style="display:none"></div>
      <!-- Alerta de sucesso -->
      <div id="alertaSucesso" class="alert alert-success" style="display:none"></div>

      <!-- Formulário -->
      <form id="formLogin">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="inputEmail" class="form-input" placeholder="o-seu-email@gmail.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <div class="input-password-wrap">
            <input type="password" id="inputSenha" class="form-input" placeholder="A sua senha" required>
            <button type="button" class="btn-toggle-password" id="btnTogglePassword">Ver</button>
          </div>
        </div>
        <div class="form-group flex-between">
          <label class="checkbox-label">
            <input type="checkbox" id="lembrarMe"> Lembrar-me
          </label>
          <a href="recuperar-password.html" class="link-forgot">Esqueceu a senha?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="btnEntrar">
          Entrar
        </button>
      </form>

      <!-- Divisor -->
      <div class="auth-divider"><span>ou</span></div>

      <!-- Link cadastro -->
      <p class="auth-switch">
        Não tem conta? <a href="cadastro.html" class="link-primary">Cadastre-se gratuitamente</a>
      </p>

      <!-- Voltar -->
      <div class="auth-back">
        <a href="index.html">← Voltar ao início</a>
      </div>

     

    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
