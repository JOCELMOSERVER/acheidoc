<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Palavra-passe — Encontra já</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#12305f">
  <meta name="description" content="Encontra já — Plataforma angolana para recuperação de documentos perdidos. Publica achados e resgata o teu documento.">
  <meta property="og:title" content="Encontra já — Recupere os seus documentos perdidos">
  <meta property="og:description" content="Plataforma angolana para recuperação de documentos perdidos. Publica achados e resgata o teu documento.">
  <meta property="og:image" content="https://encontraja.ao/favicon.svg">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_AO">
</head>
<body class="auth-body auth-login-split">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="auth-logo-icon">AD</span>
        <span class="auth-logo-text">Encontra já</span>
      </div>

      <h1 class="auth-title">Recuperar palavra-passe</h1>
      <p class="auth-subtitle">Conta de utilizador público</p>

      <div id="alertErro" class="alert alert-danger hidden"></div>
      <div id="alertOk" class="alert alert-success hidden"></div>

      <form id="formRecuperar">
        <div class="form-group">
          <label class="form-label">Email da conta</label>
          <input type="email" id="inputEmail" class="form-input" placeholder="o-seu-email@gmail.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Telefone registado</label>
          <input type="text" id="inputTelefone" class="form-input" placeholder="Ex: +244 923 111 222" required>
        </div>
        <div class="form-group">
          <label class="form-label">Nova palavra-passe</label>
          <input type="password" id="inputNovaSenha" class="form-input" placeholder="Mínimo 4 caracteres" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar palavra-passe</label>
          <input type="password" id="inputConfirmarSenha" class="form-input" placeholder="Repita a nova palavra-passe" required>
        </div>

        <button type="submit" id="btnSalvarSenha" class="btn btn-primary btn-full btn-lg">Enviar email com nova palavra-passe</button>
      </form>

      <div class="auth-back" style="margin-top:1rem;">
        <a href="login.html">← Voltar ao login</a>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/recuperar-password.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
